spring:
  application:
    name: harems-api

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/harems_db}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:postgres}

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

server:
  port: ${PORT:8080}
  servlet:
    context-path: /api

app:
  jwt:
    secret: ${JWT_SECRET:harems-super-secret-key-change-me-please-1234567890}
    expiration: ${JWT_EXPIRATION:86400000}

  frontend:
    url: ${FRONTEND_URL:http://localhost:3000}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000,https://haremsweb.vercel.app}

  admin:
    bootstrap-email: ${ADMIN_BOOTSTRAP_EMAIL:emy.rodriguezc28@gmail.com}

  limits:
    free-messages-per-character: 20

# ── Modo adulto del chat ───────────────────────────────────────────────────────
chat:
  adult-mode-enabled: ${CHAT_ADULT_MODE_ENABLED:true}
  allow-vulgar-language: ${CHAT_ALLOW_VULGAR_LANGUAGE:true}
  explicit-roleplay-enabled: ${CHAT_EXPLICIT_ROLEPLAY_ENABLED:true}
  # 0 = sin restriccion de conexion. >0 = mensajes minimos antes de escalar.
  explicit-min-connection: ${CHAT_EXPLICIT_MIN_CONNECTION:0}
  # Solo bloquear contenido ilegal (menores, no-consenso, deepfakes). NO bloquear adulto ficticio consensuado.
  block-only-illegal: ${CHAT_BLOCK_ONLY_ILLEGAL:true}
  # Reintentar cuando el modelo da rechazo moralizante ante contenido adulto permitido.
  retry-on-adult-refusal: ${CHAT_RETRY_ON_ADULT_REFUSAL:true}
  max-adult-refusal-retries: ${CHAT_MAX_ADULT_REFUSAL_RETRIES:1}

# ── AI / Chat ──────────────────────────────────────────────────────────────────
ai:
  provider: ${AI_PROVIDER:SIMULATED}
  openrouter:
    api-key: ${OPENROUTER_API_KEY:}
    model: ${OPENROUTER_MODEL:sao10k/l3.3-euryale-70b}
    fallback-models: ${OPENROUTER_FALLBACK_MODELS:sao10k/l3-euryale-70b,sao10k/l3.1-euryale-70b,gryphe/mythomax-l2-13b}
    base-url: ${OPENROUTER_BASE_URL:https://openrouter.ai/api/v1/chat/completions}
    referer: ${OPENROUTER_REFERER:https://haremsweb.vercel.app}
    title: ${OPENROUTER_TITLE:HAREMS}
    timeout-ms: ${OPENROUTER_TIMEOUT_MS:30000}
    history-size: ${OPENROUTER_HISTORY_SIZE:12}
    temperature: ${OPENROUTER_TEMPERATURE:0.95}
    max-tokens: ${OPENROUTER_MAX_TOKENS:320}
    top-p: ${OPENROUTER_TOP_P:0.92}
    frequency-penalty: ${OPENROUTER_FREQUENCY_PENALTY:0.35}
    presence-penalty: ${OPENROUTER_PRESENCE_PENALTY:0.2}

# ── Image Generation ───────────────────────────────────────────────────────────
image:
  # Options: MOCK | FAL | RUNPOD
  provider: ${IMAGE_PROVIDER:MOCK}
  default-width: ${DEFAULT_IMAGE_WIDTH:${IMAGE_DEFAULT_WIDTH:768}}
  default-height: ${DEFAULT_IMAGE_HEIGHT:${IMAGE_DEFAULT_HEIGHT:1024}}
  generation-timeout-seconds: ${FAL_TIMEOUT_SECONDS:${IMAGE_GENERATION_TIMEOUT_SECONDS:60}}

  fal:
    api-key: ${FAL_KEY:${FAL_API_KEY:}}
    base-url: ${FAL_BASE_URL:https://fal.run}

    # Modelo por defecto (usado si no se especifica el de nivel)
    model: ${FAL_IMAGE_MODEL:fal-ai/flux-pro/v1.1}

    # Modelos por nivel adulto
    model-safe: ${FAL_IMAGE_MODEL_SAFE:fal-ai/flux/schnell}
    model-sensual: ${FAL_IMAGE_MODEL_SENSUAL:fal-ai/flux-pro/v1.1}
    # NOTA: fal-ai/fast-sdxl bloquea siempre contenido adulto. Usar flux/dev para NUDE real.
    model-nude: ${FAL_IMAGE_MODEL_NUDE:fal-ai/flux/dev}
    model-explicit: ${FAL_IMAGE_MODEL_EXPLICIT:fal-ai/flux/dev}
    model-nude-fallback: ${FAL_IMAGE_MODEL_NUDE_FALLBACK:fal-ai/flux/dev}

    # Seguridad y comportamiento
    safety-tolerance: ${FAL_SAFETY_TOLERANCE:6}
    max-retries: ${FAL_MAX_RETRIES:2}
    refund-on-blocked: ${FAL_REFUND_ON_BLOCKED:true}
    validate-output: ${FAL_VALIDATE_OUTPUT:false}

  runpod:
    api-key: ${RUNPOD_API_KEY:}
    endpoint-id: ${RUNPOD_ENDPOINT_ID:}
    base-url: ${RUNPOD_BASE_URL:https://api.runpod.ai/v2}

# ── Generación de imágenes — flags globales ────────────────────────────────────
# IMAGE_GENERATION_ENABLED controla si la feature está activa en general.
# FREE_IMAGE_GENERATION_ENABLED=false bloquea imágenes para plan FREE (ya forzado en ImageGenerationService).
# PREMIUM_IMAGE_GENERATION_ENABLED=true permite imágenes para PREMIUM y VIP.
image-features:
  enabled: ${IMAGE_GENERATION_ENABLED:true}
  premium-enabled: ${PREMIUM_IMAGE_GENERATION_ENABLED:true}
  free-enabled: ${FREE_IMAGE_GENERATION_ENABLED:false}

# ── Billing provider ──────────────────────────────────────────────────────────
# BILLING_PROVIDER=PAYPAL activa el flujo real de pagos.
# Con PAYPAL activo, /subscriptions/simulate solo funciona para ADMIN.
billing:
  provider: ${BILLING_PROVIDER:}

# ── PayPal Subscriptions ──────────────────────────────────────────────────────
# Configura estas variables en Render (sandbox primero, luego live):
#   PAYPAL_MODE=sandbox
#   PAYPAL_CLIENT_ID=<sandbox_client_id>
#   PAYPAL_CLIENT_SECRET=<sandbox_client_secret>   (NUNCA hardcodear)
#   PAYPAL_WEBHOOK_ID=<webhook_id_del_dashboard>
#   PAYPAL_PRODUCT_ID=<product_id>
#   PAYPAL_PREMIUM_PLAN_ID=<plan_id_premium>
#   PAYPAL_VIP_PLAN_ID=<plan_id_vip>
#   PAYPAL_TRIAL_PLAN_ID=<plan_id_trial>
#   PAYPAL_SUCCESS_URL=https://haremsweb.vercel.app/subscription/success
#   PAYPAL_CANCEL_URL=https://haremsweb.vercel.app/subscription/cancel
#   PAYPAL_WEBHOOK_URL=https://haremapi-3a3p.onrender.com/api/payments/paypal/webhook
#
# REGLA: El plan se activa SOLO por webhook BILLING.SUBSCRIPTION.ACTIVATED.
# El endpoint /subscriptions/simulate requiere rol ADMIN.
paypal:
  mode: ${PAYPAL_MODE:sandbox}
  client-id: ${PAYPAL_CLIENT_ID:}
  client-secret: ${PAYPAL_CLIENT_SECRET:}
  webhook-id: ${PAYPAL_WEBHOOK_ID:}
  product-id: ${PAYPAL_PRODUCT_ID:}
  premium-plan-id: ${PAYPAL_PREMIUM_PLAN_ID:}
  vip-plan-id: ${PAYPAL_VIP_PLAN_ID:}
  trial-plan-id: ${PAYPAL_TRIAL_PLAN_ID:}
  success-url: ${PAYPAL_SUCCESS_URL:https://haremsweb.vercel.app/subscription/success}
  cancel-url: ${PAYPAL_CANCEL_URL:https://haremsweb.vercel.app/subscription/cancel}
  webhook-url: ${PAYPAL_WEBHOOK_URL:https://haremapi-3a3p.onrender.com/api/payments/paypal/webhook}

payment:
  provider: ${PAYMENT_PROVIDER:}
  secret-key: ${PAYMENT_SECRET_KEY:}
  webhook-secret: ${PAYMENT_WEBHOOK_SECRET:}
