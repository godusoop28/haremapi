spring:
  application:
    name: harems-api

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/harems_db}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:postgres}

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

server:
  port: ${PORT:8080}
  servlet:
    context-path: /api

app:
  jwt:
    secret: ${JWT_SECRET:harems-super-secret-key-change-me-please-1234567890}
    expiration: ${JWT_EXPIRATION:86400000}

  frontend:
    url: ${FRONTEND_URL:http://localhost:3000}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000,https://haremsweb.vercel.app}

  admin:
    bootstrap-email: ${ADMIN_BOOTSTRAP_EMAIL:emy.rodriguezc28@gmail.com}

  limits:
    free-messages-per-character: 20

# AI integration
ai:
  provider: ${AI_PROVIDER:SIMULATED}
  openai:
    api-key: ${OPENAI_API_KEY:}
  openrouter:
    api-key: ${OPENROUTER_API_KEY:}
    model: ${OPENROUTER_MODEL:openai/gpt-4o-mini}
    base-url: ${OPENROUTER_BASE_URL:https://openrouter.ai/api/v1/chat/completions}
    referer: ${OPENROUTER_REFERER:https://haremsweb.vercel.app}
    title: ${OPENROUTER_TITLE:HAREMS}
    timeout-ms: ${OPENROUTER_TIMEOUT_MS:30000}
    history-size: ${OPENROUTER_HISTORY_SIZE:10}
    temperature: ${OPENROUTER_TEMPERATURE:0.7}
    max-tokens: ${OPENROUTER_MAX_TOKENS:150}
    top-p: ${OPENROUTER_TOP_P:0.9}
    frequency-penalty: ${OPENROUTER_FREQUENCY_PENALTY:0.2}
    presence-penalty: ${OPENROUTER_PRESENCE_PENALTY:0.1}

# Image generation
image:
  provider: ${IMAGE_PROVIDER:MOCK}
  default-width: ${IMAGE_DEFAULT_WIDTH:768}
  default-height: ${IMAGE_DEFAULT_HEIGHT:1024}
  default-steps: ${IMAGE_DEFAULT_STEPS:25}
  default-cfg: ${IMAGE_DEFAULT_CFG:7.0}
  generation-timeout-seconds: ${IMAGE_GENERATION_TIMEOUT_SECONDS:120}
  runpod:
    api-key: ${RUNPOD_API_KEY:}
    endpoint-id: ${RUNPOD_ENDPOINT_ID:}
    base-url: ${RUNPOD_BASE_URL:https://api.runpod.ai/v2}

# Payments (future use - not connected yet)
payment:
  provider: ${PAYMENT_PROVIDER:}
  secret-key: ${PAYMENT_SECRET_KEY:}
  webhook-secret: ${PAYMENT_WEBHOOK_SECRET:}
